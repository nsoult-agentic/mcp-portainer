# docker-compose.yml for mcp-portainer
# Generated by DockerCompose skill — reviewed by Engineer + RedTeam
# Deploy: Portainer → Stacks → Add from Repository → GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file was generated following PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-portainer:
    image: ghcr.io/nsoult-agentic/mcp-portainer:sha-49bb890
    container_name: mcp-portainer
    restart: unless-stopped

    # ── Network ──
    ports:
      - "127.0.0.1:8900:8900"  # Loopback ONLY
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access Portainer on host

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

    # ── Filesystem ──
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-portainer/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8900/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - PORT=8900
      - PORTAINER_URL=http://host.docker.internal:9000
      - PORTAINER_ENV_ID=2
      # NEVER put secrets here — API key is read from /secrets/api-key
